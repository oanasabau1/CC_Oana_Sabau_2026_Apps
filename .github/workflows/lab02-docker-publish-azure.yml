name: Publish + Deploy Docker Images to Azure (Lab02)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  validate-deploy-config:
    runs-on: ubuntu-latest
    steps:
      - name: Check required Docker Hub and Azure settings
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_APP_SERVICE_NAME: ${{ vars.AZURE_APP_SERVICE_NAME }}
          AZURE_FUNCTION_APP_NAME: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          REACT_APP_API_BASE: ${{ vars.REACT_APP_API_BASE }}
          REACT_APP_COGNITO_AUTHORITY: ${{ vars.REACT_APP_COGNITO_AUTHORITY }}
          REACT_APP_COGNITO_CLIENT_ID: ${{ vars.REACT_APP_COGNITO_CLIENT_ID }}
          REACT_APP_COGNITO_DOMAIN: ${{ vars.REACT_APP_COGNITO_DOMAIN }}
          REACT_APP_OIDC_REDIRECT_URI: ${{ vars.REACT_APP_OIDC_REDIRECT_URI }}
          REACT_APP_OIDC_SCOPE: ${{ vars.REACT_APP_OIDC_SCOPE }}
          REACT_APP_LOGOUT_URI: ${{ vars.REACT_APP_LOGOUT_URI }}
        run: |
          missing=0
          for name in \
            DOCKERHUB_USERNAME DOCKERHUB_TOKEN \
            AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID \
            AZURE_RESOURCE_GROUP AZURE_APP_SERVICE_NAME AZURE_FUNCTION_APP_NAME \
            REACT_APP_API_BASE REACT_APP_COGNITO_AUTHORITY REACT_APP_COGNITO_CLIENT_ID \
            REACT_APP_COGNITO_DOMAIN REACT_APP_OIDC_REDIRECT_URI REACT_APP_OIDC_SCOPE REACT_APP_LOGOUT_URI; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing setting::$name is required for docker publish and Azure deploy"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  check-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci --include=optional
      - name: Static syntax checks
        run: npm run check

  check-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        env:
          CI: true
        run: npm test -- --watch=false --passWithNoTests
      - name: Build
        run: npm run build

  publish:
    runs-on: ubuntu-latest
    needs:
      - validate-deploy-config
      - check-backend
      - check-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            image: tucn-cc-backend-api
          - service: frontend
            context: ./frontend
            image: tucn-cc-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        shell: bash
        run: echo "value=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        id: build_backend
        if: matrix.service == 'backend'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Build and push frontend
        id: build_frontend
        if: matrix.service == 'frontend'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}
          build-args: |
            REACT_APP_API_BASE=${{ vars.REACT_APP_API_BASE }}
            REACT_APP_COGNITO_AUTHORITY=${{ vars.REACT_APP_COGNITO_AUTHORITY }}
            REACT_APP_COGNITO_CLIENT_ID=${{ vars.REACT_APP_COGNITO_CLIENT_ID }}
            REACT_APP_COGNITO_DOMAIN=${{ vars.REACT_APP_COGNITO_DOMAIN }}
            REACT_APP_OIDC_REDIRECT_URI=${{ vars.REACT_APP_OIDC_REDIRECT_URI }}
            REACT_APP_OIDC_SCOPE=${{ vars.REACT_APP_OIDC_SCOPE }}
            REACT_APP_LOGOUT_URI=${{ vars.REACT_APP_LOGOUT_URI }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Summary
        shell: bash
        run: |
          echo "### Published: ${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Compute image tag
        id: tag
        shell: bash
        run: echo "value=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Update App Service container image
        run: |
          az webapp config container set \
            --name "${{ vars.AZURE_APP_SERVICE_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --container-image-name "${{ secrets.DOCKERHUB_USERNAME }}/tucn-cc-frontend:${{ steps.tag.outputs.value }}"

      - name: Update Function App container image
        run: |
          az functionapp config container set \
            --name "${{ vars.AZURE_FUNCTION_APP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ secrets.DOCKERHUB_USERNAME }}/tucn-cc-backend-api:${{ steps.tag.outputs.value }}"

      - name: Restart services to pull new images
        run: |
          az webapp restart \
            --name "${{ vars.AZURE_APP_SERVICE_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"
          az functionapp restart \
            --name "${{ vars.AZURE_FUNCTION_APP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"

      - name: Deploy summary
        shell: bash
        run: |
          echo "### Azure Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Image |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| App Service (frontend) | \`${{ secrets.DOCKERHUB_USERNAME }}/tucn-cc-frontend:${{ steps.tag.outputs.value }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Function App (backend) | \`${{ secrets.DOCKERHUB_USERNAME }}/tucn-cc-backend-api:${{ steps.tag.outputs.value }}\` |" >> "$GITHUB_STEP_SUMMARY"
