name: Publish Docker Images (Lab01)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  check-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci --include=optional
      - name: Static syntax checks
        run: npm run check

  check-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --include=optional
      - name: Run tests
        env:
          CI: true
        run: npm test -- --watch=false --passWithNoTests
      - name: Build
        run: npm run build

  publish:
    runs-on: ubuntu-latest
    needs:
      - check-backend
      - check-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            image: tucn-cc-backend-api
          - service: frontend
            context: ./frontend
            image: tucn-cc-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        shell: bash
        run: echo "value=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        id: build_backend
        if: matrix.service == 'backend'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Build and push frontend
        id: build_frontend
        if: matrix.service == 'frontend'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}
          build-args: |
            REACT_APP_API_BASE=${{ vars.REACT_APP_API_BASE }}
            REACT_APP_COGNITO_AUTHORITY=${{ vars.REACT_APP_COGNITO_AUTHORITY }}
            REACT_APP_COGNITO_CLIENT_ID=${{ vars.REACT_APP_COGNITO_CLIENT_ID }}
            REACT_APP_COGNITO_DOMAIN=${{ vars.REACT_APP_COGNITO_DOMAIN }}
            REACT_APP_OIDC_REDIRECT_URI=${{ vars.REACT_APP_OIDC_REDIRECT_URI }}
            REACT_APP_OIDC_SCOPE=${{ vars.REACT_APP_OIDC_SCOPE }}
            REACT_APP_LOGOUT_URI=${{ vars.REACT_APP_LOGOUT_URI }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Summary
        shell: bash
        run: |
          echo "### Published: ${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
